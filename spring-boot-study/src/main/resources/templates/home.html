<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Home</title>
    <style>
        /* === 전체 화면 === */
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #89f7fe, #66a6ff); /* 파랑-하늘 그라디언트 */
            font-family: 'Noto Sans KR', 'Segoe UI', sans-serif;
        }

        /* === 중앙 카드 === */
        .container {
            background: rgba(255, 255, 255, 0.15);
            padding: 60px 100px;
            border-radius: 20px;
            text-align: center;
            color: white;
            backdrop-filter: blur(10px); /* 유리 느낌 */
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
        }

        /* === 제목 === */
        h1 {
            font-size: 4em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.3);
        }

        /* === 부제목 === */
        p {
            font-size: 1.3em;
            opacity: 0.9;
            margin-bottom: 30px;
        }

        /* === 버튼 === */
        button {
            background: white;
            color: #4e8cff;
            border: none;
            padding: 12px 28px;
            font-size: 1em;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
        }

        button:hover {
            background: #e9e9e9;
            transform: translateY(-2px);
        }

        footer {
            margin-top: 40px;
            font-size: 0.9em;
            color: rgba(255,255,255,0.8);
        }
    </style>
</head>
<body>
<div class="container">
    <h1>안녕 👋</h1>
    <p>환영합니다. 오늘도 좋은 하루 되세요 ☀️</p>
    <button onclick="alert('환영합니다!')">시작하기</button>
    <footer>© 2025 Home Page Design</footer>
</div>
</body>
</html>
