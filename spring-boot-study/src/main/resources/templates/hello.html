<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Korea-it</title>
    <style>
        /* === 전체 화면 기본 설정 === */
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', sans-serif;
            color: white;
            text-align: center;

            /* ✅ 배경 이미지 (필요 시 수정 가능) */
            background-image: url('https://i.pinimg.com/1200x/b0/df/95/b0df95cfc6f31293d002d4d6daac253c.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            position: relative;
        }

        /* ✅ 배경 어둡게 오버레이 */
        body::before {
            content: "";
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.4);
            z-index: 0;
        }

        /* ✅ 실제 콘텐츠 (오버레이 위) */
        h1, p, button {
            position: relative;
            z-index: 1;
        }

        h1 {
            font-size: 3em;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.5);
            margin-bottom: 20px;
        }

        p {
            font-size: 1.2em;
            margin-bottom: 30px;
            color: rgba(255, 255, 255, 0.9);
        }

        /* ✅ 버튼 스타일 */
        button {
            background: white;
            color: #4e9af1;
            border: none;
            padding: 12px 28px;
            font-size: 1em;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover {
            background: #f1f1f1;
            transform: translateY(-2px);
        }

        /* ✅ 반투명 박스(선택사항) */
        .content-box {
            background: rgba(255, 255, 255, 0.1);
            padding: 40px 60px;
            border-radius: 15px;
            border: 2px solid rgba(255,255,255,0.3);
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>
<div class="content-box">
    <h1>Hello Spring Boot!</h1>
    <!--<div th:text="${hello}"></div>-->
    <p>Welcome to <strong>Korea IT</strong> Spring Boot Project 🚀</p>
    <button th:onclick="'location.href=\'/home\''">Go Home</button>
</div>
</body>
</html>
